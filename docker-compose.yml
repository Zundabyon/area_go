services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: area_go
      POSTGRES_PASSWORD: password
      POSTGRES_DB: area_go_development
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U area_go"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://area_go:password@db/area_go_development
      RAILS_ENV: development
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
    env_file:
      - path: .env
        required: false
    depends_on:
      db:
        condition: service_healthy
    command: >
      bash -c "
        bundle exec rails db:prepare &&
        bin/dev
      "
    stdin_open: true
    tty: true

volumes:
  postgres_data:
  bundle_cache:
